name: Build and publish wheels on PyPI

on:
  release:
    types: [created]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  linux-x86-wheels:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        container:
          - ["many", "quay.io/pypa/manylinux_2_28_x86_64"]
          - ["musl", "quay.io/pypa/musllinux_1_2_x86_64"]
    container: ${{ matrix.container[1] }}
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        run: bash .github/workflows/build-wheels.sh
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.container[0] }}-${{ runner.arch }}
          path: wheelhouse
          if-no-files-found: error

  linux-aarch-wheels:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        container:
          - ["many", "quay.io/pypa/manylinux_2_28_aarch64"]
          - ["musl", "quay.io/pypa/musllinux_1_2_aarch64"]
    container: ${{ matrix.container[1] }}
    steps:
      - uses: laverdet/alpine-arm64@v1
        if: matrix.container[0] == 'musl'
      - uses: actions/checkout@v4
      - name: Build wheels
        run: bash .github/workflows/build-wheels.sh
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.container[0] }}-${{ runner.arch }}
          path: wheelhouse
          if-no-files-found: error

  osx-wheels:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9","3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          default: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheels
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin
          python3 -m pip install -r requirements.txt -r requirements-dev.txt
          maturin build --release --strip --target universal2-apple-darwin --features python,parallel,accelerate
          python3 -m pip install pyfuel --no-index --find-links target/wheels
          #cd tests && python3 -m unittest discover && cd ..
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.python-version }}
          path: target/wheels
          if-no-files-found: error

  windows-wheels:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          default: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: fortran-lang/setup-fortran@v1
      - uses: johnwason/vcpkg-action@v8
        id: vcpkg
        with:
          pkgs: openblas lapack
          triplet: x64-windows-static-md
          token: ${{ github.token }}
      - name: Expose vcpkg to Cargo
        run: |
          Write-Output "VCPKG_ROOT=${{ github.workspace }}\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Output "VCPKG_DEFAULT_TRIPLET=x64-windows-static-md" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Output "PATH=${{ github.workspace }}\vcpkg;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Build wheels
        run: |
          python -m pip install -r requirements.txt -r requirements-dev.txt
          maturin build --release --strip --features python,parallel,openblas-system-static
          python -m pip install pyfuel --no-index --find-links target/wheels
          #cd tests && python -m unittest discover && cd ..
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.python-version }}
          path: target/wheels
          if-no-files-found: error

  upload-wheels:
    name: Upload wheels to PyPI
    needs: [linux-x86-wheels, linux-aarch-wheels, osx-wheels, windows-wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyfuel
    permissions:
      id-token: write
    steps:
      - name: Collect artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: wheels/
      - name: List contents
        run: ls -R
        working-directory: wheels/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheels/
          skip-existing: true
          verbose: true
          verify-metadata: false

